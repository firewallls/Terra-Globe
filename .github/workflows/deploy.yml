name: Automatic deploy of my vanilla app
on:
  push:
    branches: ['main']

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup node env
        uses: actions/setup-node@v6
        with:
          node-version: '25'
      - name: Clean install of pkgs
        run: npm ci
      - name: Build app
        run: npm run build
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist